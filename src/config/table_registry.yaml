databases:
  main_db:
    type: sqlite
    path: "./data/db/admissions.db"

tables:
  admission_scores:
    db_id: "main_db"
    physical_name: "admission_scores"
    description: "各省各年份录取数据宽表，按 province + year 查询整行"
    query_key:
      - province
      - year
    tool_name: "query_admission_scores"
    use_when:
      - "用户查询某省某年的录取数据"
      - "用户查询最高分、平均分、最低分、位次"
      - "用户查询某省近几年录取情况"
    columns:
      province: "省份名称"
      year: "年份"
      admission_count: "总录取人数"
      regular_batch_count: "普通批次普通专业人数"
      joint_program_count: "普通批次中外合作人数"
      physics_review_count: "物理学综评人数"
      kcl_count: "KCL联合医学院人数"
      max_score: "最高分原文"
      max_rank: "最高分位次原文"
      avg_score: "平均分原文"
      avg_rank: "平均分位次原文"
      min_score: "最低分原文"
      min_rank: "最低分位次原文"
      note: "备注"
