databases:
  main_db:
    type: sqlite
    path: "./data/db/admissions.db"

tables:
  admission_scores:
    db_id: "main_db"
    physical_name: "admission_scores"
    description: "各省各年份录取数据宽表。每条结果对应某省某一年的完整录取记录；生成答案时，除非用户明确只问单个指标，否则应优先按照 columns 中登记的字段顺序完整展示已返回列，包括人数、各批次人数、物理学综评人数、KCL联合医学院人数、最高分/平均分/最低分、位次及备注等信息。"
    query_key:
      - province
      - year
    tool_name: "query_admission_scores"
    use_when:
      - "用户查询某省某年的录取数据"
      - "用户查询最高分、平均分、最低分、位次、录取人数、普通批次普通专业人数、普通批次中外合作人数、物理学综评人数、KCL联合医学院人数"
      - "用户查询某省近几年录取情况"
    columns:
      province: "省份"
      year: "年份"
      admission_count: "人数"
      regular_batch_count: "普通批次普通专业人数"
      joint_program_count: "普通批次中外合作人数"
      physics_review_count: "物理学综评人数"
      kcl_count: "KCL联合医学院人数"
      max_score: "最高分"
      max_rank: "最高分位次"
      avg_score: "平均分"
      avg_rank: "平均分位次"
      min_score: "最低分"
      min_rank: "最低分位次"
      note: "备注"
