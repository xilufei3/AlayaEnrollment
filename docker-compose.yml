# AlayaEnrollment — Full-stack Docker Compose
#
# Usage:
#   docker compose up --build -d       # Start all services
#   docker compose logs -f backend     # Follow backend logs
#   docker compose down                # Stop all services
#
# For development (Milvus only):
#   docker compose -f infra/docker/milvus-compose.yml up -d

services:
  # ── Infrastructure ──────────────────────────────────────────

  etcd:
    container_name: alaya-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - ./docker-data/etcd:/etcd
    restart: unless-stopped

  minio:
    container_name: alaya-milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - ./docker-data/minio:/minio_data
    restart: unless-stopped

  milvus:
    container_name: alaya-milvus-standalone
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./docker-data/milvus:/var/lib/milvus
    ports:
      - "127.0.0.1:19531:19530"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Application ─────────────────────────────────────────────

  backend:
    container_name: alaya-backend
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file: .env
    environment:
      - MILVUS_URI=http://milvus:19530
      - RUNTIME_ROOT=/app/.runtime
    ports:
      - "0.0.0.0:8008:8008"
    volumes:
      - ./data:/app/data
      - ./.runtime:/app/.runtime
    depends_on:
      milvus:
        condition: service_healthy
    restart: unless-stopped

  web:
    container_name: alaya-web
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file: .env
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8008
      - HOSTNAME=0.0.0.0
      - PORT=3000
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3001}:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    container_name: alaya-nginx
    build:
      context: .
      dockerfile: infra/docker/nginx.Dockerfile
    ports:
      - "8082:80"
    depends_on:
      - web
    restart: unless-stopped
